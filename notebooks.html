<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
}

.nav-link:hover { text-decoration: underline; }
.active-link { font-weight: bold; text-decoration: underline; }

.sidebar {
  width: 80px;
  height: 100vh;
  background: #1e2a44;
  position: fixed;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
}

.sidebar i {
  color: white;
  font-size: 20px;
  margin: 20px 0;
  cursor: pointer;
}

.topbar {
  margin-left: 80px;
  background: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.content {
  margin-left: 80px;
  padding: 20px;
}

.card {
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

.card-top {
  height: 100px;
}

.bg1 { background: #ff6b6b; }
.bg2 { background: #4ecdc4; }
.bg3 { background: #ffa94d; }
.bg4 { background: #845ef7; }
.bg5 { background: #339af0; }
.bg6 { background: #51cf66; }

.search-box {
  max-width: 300px;
}
</style>
</head>

<body>


<div class="sidebar">
  <i onclick="goPage('dashboard.html')">🏠</i>
  <i onclick="goPage('notebooks.html')">📘</i>
  <i onclick="goPage('tasks.html')">📂</i>
  <i onclick="goPage('profile.html')">👤</i>
  <i onclick="goPage('index.html')">🚪</i>
</div>

<div class="topbar">
  <h5>ONLINE NOTEBOOKS</h5>
  <div>
    <span id="studentName">Student</span>
  </div>
</div>

<div class="content">
  <p>This is the list of your classes</p>

  <div class="d-flex gap-3 mb-4">
    <input type="text" class="form-control search-box" placeholder="Search class..." onkeyup="searchClass(this.value)">
  </div>

  <div class="row" id="classContainer"></div>
</div>

<script>

let student = "Andrei";

let classes = [
  {name: "English 9", teacher: "Mr. Alegrid", color: "bg1"},
  {name: "Music & Arts", teacher: "Ms. Aguirre", color: "bg2"},
  {name: "Social Studies", teacher: "Mr. Roque", color: "bg3"},
  {name: "ICT", teacher: "Mr. Balajadia", color: "bg4"},
  {name: "Science", teacher: "Ms. Galang", color: "bg5"},
  {name: "Math", teacher: "Mr. Cristobal", color: "bg6"}
];

function loadClasses(list) {
  let container = document.getElementById("classContainer");
  container.innerHTML = "";

  for (let i = 0; i < list.length; i++) {
    let c = list[i];

    container.innerHTML += `
      <div class="col-md-3 mb-4">
        <div class="card">
          <div class="card-top ${c.color}"></div>
          <div class="p-3">
            <h6>${c.name}</h6>
            <p>${c.teacher}</p>
            <button class="btn btn-sm btn-outline-primary" onclick="openClass('${c.name}')">Open</button>
          </div>
        </div>
      </div>
    `;
  }
}

function searchClass(value) {
  let filtered = [];

  for (let i = 0; i < classes.length; i++) {
    if (classes[i].name.toLowerCase().includes(value.toLowerCase())) {
      filtered.push(classes[i]);
    }
  }

  loadClasses(filtered);
}


function openClass(name) {
  alert("Opening " + name);
}

function goPage(page) {
  window.location.href = page;
}

document.getElementById("studentName").innerHTML = student;

let total = classes.length;
console.log("Total Classes:", total);

loadClasses(classes);
</script>


</body>
</html>
