<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Portal Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#ffffff;
}

.page-wrapper{
  min-height:100vh;
  display:flex;
}

.left-panel{
  flex:5;
  background:#e8defa;
  background-image:url("mainphoto.jpg");
  background-size:cover;
  background-position:center;
}

.right-panel{
  flex:2;
  background:#ffffff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:40px 60px;
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:67px;
}

.logo-box{
  width: 80px;
  height: 80px;
  background-image: url("logo.jpg");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
}

.school-text{
  font-size:20px;
  color:#095088;
  line-height:1;
}

.form-control{
  font-size:13px;
  padding:8px 10px;
  border-radius:5px;
  background:#f7f7f7;
}

.btn-login{
  width:100%;
  padding:9px;
  margin-top:8px;
  background:#2f80ed;
  color:#ffffff;
  border-radius:5px;
  border:none;
}

.terms-text{
  margin-top:8px;
  font-size:14px;
  text-align:center;
  color:#555;
}
</style>
</head>

<body>

<div class="page-wrapper">

  <div class="left-panel"></div>

  <div class="right-panel">

    <div class="logo">
      <div class="logo-box"></div>
      <div class="school-text">
        OPERATION BROTHERHOOD<br>
        MONTESSORI CENTER
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold" style="font-size:13px;">Email or ID Number</label>
      <input type="text" id="username" class="form-control" placeholder="Email or ID Number">
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold" style="font-size:13px;">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Password">
    </div>

    <button type="button" class="btn btn-login" onclick="login()">
      Log in
    </button>

    <p class="terms-text">
      By logging in, you agree with Terms and Conditions.
    </p>

  </div>
</div>

<script>
var CorrectUser = "105150467";
var CorrectPass = "Emerald67";
var attempts = 0;
var maxAttempts = 3;
var locked = false;

function login(){
  if (locked) {
    alert("Account locked.");
    return;
  }

  var u = document.getElementById("username").value;
  var p = document.getElementById("password").value;

  if(u === CorrectUser && p === CorrectPass){
    
    localStorage.setItem("studentName", u);

    window.location.href = "dashboard.html";
  } else {
    attempts++;

    if (attempts >= maxAttempts) {
      locked = true;
      alert("Account locked. Too many failed attempts.");
    } else {
      alert("Login Failed. Attempts left: " + (maxAttempts - attempts));
    }
  }
}
</script>

</body>
</html>
